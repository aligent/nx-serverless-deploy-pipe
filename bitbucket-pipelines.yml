image: atlassian/default-image:5
clone:
  depth: full

definitions:
  services:
    docker:
      memory: 3072

  steps:
    - step: &docker-validate
        name: 🚧 Docker Build (validate)
        services:
          - docker
        script:
          - export NODE_TAG="${NODE_TAG:-20}"
          - bash ci/docker-buildx-validate.sh

    - step: &docker-push
        name: 🛫 Build and Push Docker Image
        services:
          - docker
        script:
          - export NODE_TAG="${NODE_TAG:-20}"
          - bash ci/docker-buildx-push.sh

pipelines:
  pull-requests:
    '**':
      - parallel:
          matrix:
            - NODE_TAG: ["20", "24"]
          steps:
            - step:
                <<: *docker-validate
                name: "🚧 Validate (Node ${NODE_TAG})"

branches:
  main:
    - step:
        <<: *docker-push
        name: "🛫 Build & Push (Node 20 + 24)"
        deployment: main
        script:
          - export NODE_TAG=20
          - bash ci/docker-buildx-push.sh
          - export NODE_TAG=24
          - bash ci/docker-buildx-push.sh
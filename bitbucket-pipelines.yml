image: atlassian/default-image:5
clone:
  depth: full

definitions:
  services:
    docker:
      memory: 3072

  steps:
    - step: &docker-validate
        name: 🚧 Docker Build (validate)
        services:
          - docker
        script:
          - export NODE_TAG=20
          - bash ci/docker-buildx-validate.sh
          - export NODE_TAG=24
          - bash ci/docker-buildx-validate.sh

    - step: &docker-push
        name: 🛫 Build and Push Docker Image
        services:
          - docker
        script:
          - export NODE_TAG=20
          - bash ci/docker-buildx-push.sh
          - export NODE_TAG=24
          - bash ci/docker-buildx-push.sh
pipelines:
  pull-requests:
    '**':
    - step:
        <<: *docker-validate
        name: "🚧 Validate (Node 20 + 24)"

  branches:
    main:
      - step:
          <<: *docker-push
          name: "🛫 Build & Push (Node 20 + 24)"
          deployment: main
